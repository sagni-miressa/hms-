services:
  postgres:
    image: postgres:15-alpine
    container_name: hiring_postgres
    environment:
      POSTGRES_USER: hiring_user
      POSTGRES_PASSWORD: hiring_password_dev
      POSTGRES_DB: hiring_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiring_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_replica:
    image: postgres:15-alpine
    container_name: hiring_postgres_replica
    environment:
      POSTGRES_USER: hiring_user
      POSTGRES_PASSWORD: hiring_password_dev
      POSTGRES_DB: hiring_system
    ports:
      - "5433:5432"
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    container_name: hiring_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: hiring_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres_data:
  postgres_replica_data:
  redis_data:
  minio_data:
